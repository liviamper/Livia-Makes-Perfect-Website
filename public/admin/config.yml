backend:
  name: github
  repo: liviamper/Livia-Makes-Perfect-Website
  branch: main
  base_url: https://auth.sveltia.app
  app_id: Ov23lii5yOlDXX336xhy

media_folder: "public/assets/uploads"
public_folder: "/assets/uploads"

site_url: https://liviamperfect.web.app
logo_url: https://liviamperfect.web.app/assets/images/social.png

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "src/content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    view_url: "https://liviamperfect.web.app/blog/{{id}}"
    fields:
      - label: "1. FOCUS: Writing Body"
        name: "body"
        widget: "markdown"
        hint: "Write your main content here. Headlines (h2, h3) will automatically build your Table of Contents."
      
      - label: "2. SETTINGS & SEO"
        name: "settings"
        widget: "object"
        fields:
          - {label: "Post Title", name: "title", widget: "string"}
          - {label: "Display Date", name: "date", widget: "datetime"}
          - {label: "Card Image", name: "image", widget: "image", required: false}
          - {label: "Author Name", name: "author", widget: "string", default: "Livia Team"}
          - {label: "SEO Description", name: "description", widget: "text"}
          - label: "Category"
            name: "tag"
            widget: "select"
            options: ["Insights", "Marketing", "RevOps", "Ads", "Branding"]
            create: true
            default: "Insights"
          - {label: "Featured on Homepage", name: "featured", widget: "boolean", default: false}
