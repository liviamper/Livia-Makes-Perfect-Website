backend:
  name: github
  repo: liviamper/Livia-Makes-Perfect-Website
  branch: main
  base_url: https://auth.sveltia.app
  app_id: Ov23lii5yOlDXX336xhy

media_folder: "public/assets/uploads"
public_folder: "/assets/uploads"

site_url: https://liviamperfect.web.app
logo_url: https://liviamperfect.web.app/assets/images/social.png

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "src/content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    view_url: "https://liviamperfect.web.app/blog/{{id}}"
    editor:
      preview: false
    fields:
      - {label: "1. MAIN TITLE", name: "title", widget: "string", hint: "The primary headline for your blog."}
      
      - label: "2. SEO & PREVIEW (Metadata)"
        name: "description"
        widget: "text"
        hint: "Short summary for Google and Social Media."

      - label: "Featured Image"
        name: "image"
        widget: "image"
        required: false
        hint: "This image appears right below the title on the website."
      
      - label: "3. WRITING SPACE"
        name: "body"
        widget: "markdown"
        hint: "Start writing your story here. Use Headlines (##) to build the TOC automatically."

      - label: "4. PUBLISH SETTINGS (Technical)"
        name: "date"
        widget: "datetime"
        hint: "Schedule when the post goes live."

      - {label: "Author Name", name: "author", widget: "string", default: "Livia Team"}
      
      - label: "Category"
        name: "tag"
        widget: "select"
        options: ["Insights", "Marketing", "RevOps", "Ads", "Branding"]
        create: true
        default: "Insights"
      
      - {label: "Featured on Homepage", name: "featured", widget: "boolean", default: false}
